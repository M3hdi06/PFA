services:
  - type: web
    name: prepfa-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd back && npm install
    startCommand: cd back && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
